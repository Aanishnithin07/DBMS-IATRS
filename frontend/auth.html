<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ATS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .modal-enter { animation: modalEnter 0.3s ease; }
        @keyframes modalEnter {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 relative overflow-hidden">
    <!-- Floating Background Shapes -->
    <div class="floating-shape w-96 h-96 bg-blue-500 top-[-10%] left-[-10%]"></div>
    <div class="floating-shape w-64 h-64 bg-purple-500 bottom-[-5%] right-[-5%] animation-delay-2s" style="animation-delay: 2s"></div>
    <div class="floating-shape w-48 h-48 bg-indigo-500 top-[20%] right-[10%]" style="animation-delay: 4s"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass-card rounded-3xl shadow-2xl overflow-hidden modal-enter">
            <!-- Header with gradient -->
            <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 px-8 py-10 text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAxMCAwIEwgMCAwIDAgMTAiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS1vcGFjaXR5PSIwLjA1IiBzdHJva2Utd2lkdGg9IjEiLz48L3BhdHRlcm4+PC9kZWZzPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InVybCgjZ3JpZCkiLz48L3N2Zz4=')] opacity-30"></div>
                <div class="relative">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-white mb-2">Smart ATS</h1>
                    <p class="text-slate-400 text-sm">Intelligent Recruitment Platform</p>
                </div>
            </div>

            <!-- Tab Switcher -->
            <div class="px-8 pt-6">
                <div class="flex bg-slate-100 rounded-xl p-1.5">
                    <button id="loginModeBtn" type="button" class="flex-1 px-4 py-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-white shadow-sm text-slate-900">
                        Sign In
                    </button>
                    <button id="registerModeBtn" type="button" class="flex-1 px-4 py-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-slate-700">
                        Create Account
                    </button>
                </div>
            </div>

            <!-- Message Box -->
            <div id="authMessage" class="hidden mx-8 mt-5 px-4 py-3.5 rounded-xl border text-sm font-medium"></div>

            <!-- Form -->
            <form id="authForm" class="px-8 py-6 space-y-5">
                <!-- Full Name (Register only) -->
                <div id="fullNameGroup" class="hidden">
                    <label for="fullName" class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                    <input id="fullName" type="text" placeholder="Enter your full name"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                </div>

                <!-- Role Selection -->
                <div>
                    <label for="role" class="block text-sm font-semibold text-slate-700 mb-2">Account Type</label>
                    <select id="role" class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none bg-white">
                        <option value="candidate">Candidate - Apply for jobs</option>
                        <option value="recruiter">Recruiter - Post & manage jobs</option>
                    </select>
                </div>

                <!-- Phone (Candidate only, Register only) -->
                <div id="phoneGroup" class="hidden">
                    <label for="phone" class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
                    <input id="phone" type="text" placeholder="+1 (555) 123-4567"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                </div>

                <!-- Company (Recruiter only, Register only) -->
                <div id="companyGroup" class="hidden">
                    <label for="company" class="block text-sm font-semibold text-slate-700 mb-2">Company Name</label>
                    <input id="company" type="text" placeholder="Acme Corporation"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input id="email" type="email" required placeholder="you@company.com"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <input id="password" type="password" required placeholder="••••••••"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                    <p id="passwordHint" class="hidden text-xs text-slate-500 mt-2">Use at least 8 characters with a mix of letters and numbers</p>
                </div>

                <!-- Submit Button -->
                <button id="submitBtn" type="submit" class="w-full btn-gradient text-white font-semibold py-4 rounded-xl transition-all duration-200 shadow-lg mt-2">
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="px-8 pb-8 text-center">
                <p class="text-xs text-slate-500">
                    By continuing, you agree to our Terms of Service and Privacy Policy
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5001';
        let mode = 'login';

        const form = document.getElementById('authForm');
        const roleField = document.getElementById('role');
        const messageBox = document.getElementById('authMessage');
        const submitBtn = document.getElementById('submitBtn');
        const fullNameGroup = document.getElementById('fullNameGroup');
        const phoneGroup = document.getElementById('phoneGroup');
        const companyGroup = document.getElementById('companyGroup');
        const passwordHint = document.getElementById('passwordHint');

        document.getElementById('loginModeBtn').addEventListener('click', () => setMode('login'));
        document.getElementById('registerModeBtn').addEventListener('click', () => setMode('register'));
        roleField.addEventListener('change', updateRoleSpecificFields);
        form.addEventListener('submit', handleSubmit);

        initializeFromQuery();
        updateRoleSpecificFields();

        function initializeFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const requestedRole = params.get('role');
            const requestedMode = params.get('mode');

            if (requestedRole === 'candidate' || requestedRole === 'recruiter') {
                roleField.value = requestedRole;
            }

            if (requestedMode === 'register') {
                setMode('register');
            } else {
                setMode('login');
            }
        }

        function setMode(nextMode) {
            mode = nextMode;
            const isRegister = mode === 'register';

            fullNameGroup.classList.toggle('hidden', !isRegister);
            passwordHint.classList.toggle('hidden', !isRegister);

            document.getElementById('loginModeBtn').className = `flex-1 px-4 py-3 rounded-lg text-sm font-semibold transition-all duration-200 ${!isRegister ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'}`;
            document.getElementById('registerModeBtn').className = `flex-1 px-4 py-3 rounded-lg text-sm font-semibold transition-all duration-200 ${isRegister ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'}`;

            submitBtn.textContent = isRegister ? 'Create Account' : 'Sign In';
            clearMessage();
            updateRoleSpecificFields();
        }

        function updateRoleSpecificFields() {
            const isRegister = mode === 'register';
            const isCandidate = roleField.value === 'candidate';

            phoneGroup.classList.toggle('hidden', !(isRegister && isCandidate));
            companyGroup.classList.toggle('hidden', !(isRegister && !isCandidate));
        }

        function showMessage(text, type = 'error') {
            messageBox.textContent = text;
            if (type === 'success') {
                messageBox.className = `mx-8 mt-5 px-4 py-3.5 rounded-xl border text-sm font-medium bg-emerald-50 border-emerald-200 text-emerald-800`;
            } else {
                messageBox.className = `mx-8 mt-5 px-4 py-3.5 rounded-xl border text-sm font-medium bg-red-50 border-red-200 text-red-800`;
            }
        }

        function clearMessage() {
            messageBox.className = 'hidden mx-8 mt-5 px-4 py-3.5 rounded-xl border text-sm font-medium';
            messageBox.textContent = '';
        }

        async function handleSubmit(event) {
            event.preventDefault();
            clearMessage();

            submitBtn.disabled = true;
            submitBtn.textContent = mode === 'register' ? 'Creating...' : 'Signing in...';

            try {
                const payload = buildPayload();
                const endpoint = mode === 'register' ? '/auth/register' : '/auth/login';

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const responseData = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(responseData.error || 'Authentication failed');
                }

                localStorage.setItem('user', JSON.stringify(responseData.user));
                showMessage(responseData.message || 'Success! Redirecting...', 'success');

                setTimeout(() => {
                    if (responseData.user.role === 'recruiter') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 500);
            } catch (error) {
                showMessage(error.message || 'Something went wrong');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = mode === 'register' ? 'Create Account' : 'Sign In';
            }
        }

        function buildPayload() {
            const role = roleField.value;
            const basePayload = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            if (mode === 'login') {
                return basePayload;
            }

            const payload = {
                ...basePayload,
                full_name: document.getElementById('fullName').value.trim(),
                role
            };

            if (role === 'candidate') {
                payload.phone = document.getElementById('phone').value.trim();
            } else {
                payload.company = document.getElementById('company').value.trim();
            }

            return payload;
        }
    </script>
</body>
</html>
