<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ATS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 relative overflow-hidden">
    <!-- Floating Background Shapes -->
    <div class="floating-shape w-96 h-96 bg-blue-500 top-[-10%] left-[-10%]"></div>
    <div class="floating-shape w-64 h-64 bg-purple-500 bottom-[-5%] right-[-5%]" style="animation-delay: 2s"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass-card rounded-3xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 px-8 py-10 text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAxMCAwIEwgMCAwIDAgMTAiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS1vcGFjaXR5PSIwLjA1IiBzdHJva2Utd2lkdGg9IjEiLz48L3BhdHRlcm4+PC9kZWZzPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InVybCgjZ3JpZCkiLz48L3N2Zz4=')] opacity-30"></div>
                <div class="relative">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
                    <p class="text-slate-400 text-sm">Sign in to continue to Smart ATS</p>
                </div>
            </div>

            <!-- Message Box -->
            <div id="messageBox" class="hidden mx-8 mt-6 px-4 py-3.5 rounded-xl border text-sm font-medium"></div>

            <!-- Form -->
            <form id="loginForm" class="px-8 py-6 space-y-5">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input id="email" type="email" required placeholder="you@company.com"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <input id="password" type="password" required placeholder="••••••••"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none" />
                </div>

                <div>
                    <label for="role" class="block text-sm font-semibold text-slate-700 mb-2">Sign in as</label>
                    <select id="role" class="w-full border border-slate-200 rounded-xl px-4 py-3.5 text-sm input-field transition-all duration-200 outline-none bg-white">
                        <option value="candidate">Candidate - Browse & apply for jobs</option>
                        <option value="recruiter">Recruiter - Manage jobs & candidates</option>
                    </select>
                </div>

                <button id="loginButton" type="submit" class="w-full btn-gradient text-white font-semibold py-4 rounded-xl transition-all duration-200 shadow-lg mt-2">
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="px-8 pb-8">
                <div class="flex items-center justify-between text-sm">
                    <p class="text-slate-500">
                        New to Smart ATS?
                        <a href="auth.html" class="text-blue-600 font-semibold hover:text-blue-700 hover:underline">Create account</a>
                    </p>
                    <a href="auth.html?mode=register" class="text-blue-600 font-semibold hover:text-blue-700 hover:underline">Register</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5001';

        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const loginButton = document.getElementById('loginButton');
            const payload = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            showMessage('', 'error', true);
            loginButton.disabled = true;
            loginButton.textContent = 'Signing in...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('user', JSON.stringify(data.user));

                if (data.user.role === 'candidate') {
                    window.location.href = 'index.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                showMessage(error.message || 'Unable to login right now.');
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'Sign In';
            }
        });

        function showMessage(message, type = 'error', hide = false) {
            const messageBox = document.getElementById('messageBox');

            if (hide) {
                messageBox.className = 'hidden mx-8 mt-6 px-4 py-3.5 rounded-xl border text-sm font-medium';
                messageBox.textContent = '';
                return;
            }

            if (type === 'success') {
                messageBox.className = `mx-8 mt-6 px-4 py-3.5 rounded-xl border text-sm font-medium bg-emerald-50 border-emerald-200 text-emerald-800`;
            } else {
                messageBox.className = `mx-8 mt-6 px-4 py-3.5 rounded-xl border text-sm font-medium bg-red-50 border-red-200 text-red-800`;
            }
            messageBox.textContent = message;
        }
    </script>
</body>
</html>
